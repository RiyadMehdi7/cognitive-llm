model_id: HuggingFaceTB/SmolLM3-3B
quantization: 4bit

use_block1: true
use_block2: false
use_block3: false
use_block4: false
use_block5: false
use_block6: true

training:
  device: cuda
  batch_size: 4
  gradient_accumulation: 4
  learning_rate: 2e-4
  warmup_steps: 100
  max_steps: 500
  max_seq_len: 512
  bf16: true
  gradient_checkpointing: true
  max_grad_norm: 1.0
  save_every_n_steps: 500
  eval_every_n_steps: 100
  checkpoint_dir: ./checkpoints
  use_wandb: false

dataset: gsm8k

lambda_config:
  surprise: 0.01
  critic: 0.1
  predictive: 0.05
