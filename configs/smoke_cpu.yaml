model_id: HuggingFaceTB/SmolLM-360M
device: cpu
quantization: none
dtype: fp32

# All blocks off for smoke test
use_block1: false
use_block2: false
use_block3: false
use_block4: false
use_block5: false
use_block6: false

training:
  batch_size: 2
  gradient_accumulation: 1
  learning_rate: 0.0002
  warmup_steps: 2
  max_steps: 10
  max_seq_len: 128
  gradient_checkpointing: false
  max_grad_norm: 1.0
  save_every_n_steps: 9999
  eval_every_n_steps: 9999
  use_wandb: false

dataset: gsm8k

gsm8k_eval_samples: 0
val_subset_size: 8

lambda_config:
  surprise: 0.01
  critic: 0.1
  predictive: 0.05
