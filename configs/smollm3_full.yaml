model_id: HuggingFaceTB/SmolLM3-3B
quantization: none           # Full bf16 on Kaggle A100

# Block flags — all Phase 1 blocks
use_block1: true
use_block2: true
use_block3: true
use_block4: false            # Phase 2 only
use_block5: true
use_block6: true

training:
  batch_size: 8
  gradient_accumulation: 4   # Effective batch = 32
  learning_rate: 1e-4
  warmup_steps: 300
  max_steps: 5000
  max_seq_len: 1024
  fp16: false
  bf16: true
  gradient_checkpointing: true
  max_grad_norm: 1.0
  save_every_n_steps: 500
  eval_every_n_steps: 500
  checkpoint_dir: ./checkpoints
  use_wandb: true

datasets:
  - gsm8k
  - arc_challenge

lambda_config:
  surprise: 0.01
  critic: 0.1
  predictive: 0.05
